<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tee Ouan Packaging</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #ff69b4; --pink-dark: #d4006e; --pink-mid: #e0459a;
      --pink-light: #ffe0f0; --cream: #fefce8; --bg: #f5f7ee;
      --white: #ffffff; --text: #2d2d2d; --text-muted: #6b6b6b;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 36px rgba(255,105,180,0.18);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* --- NAV --- */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px; background: var(--white);
      border-bottom: 1px solid #f0e0ea; position: sticky; top: 0; z-index: 1000;
    }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.2rem;
      color: var(--pink); cursor: pointer;
    }
    
    /* 要求1: 言語選択ボタン */
    .lang-switcher {
      display: flex; gap: 5px; background: #f0f0f0; padding: 4px; border-radius: 50px;
    }
    .lang-btn {
      border: none; padding: 5px 12px; border-radius: 50px; cursor: pointer;
      font-size: 0.75rem; font-weight: 700; transition: 0.2s; background: transparent;
    }
    .lang-btn.active { background: var(--pink); color: white; }

    .nav-links { display: flex; gap: 10px; list-style: none; align-items: center; }
    .nav-links li a {
      text-decoration: none; font-size: 0.9rem; font-weight: 600;
      color: var(--text); padding: 8px 15px; border-radius: 50px; cursor: pointer;
    }
    .nav-links li a.active { background: var(--pink-light); color: var(--pink-dark); }

    /* --- PRODUCT MEDIA (要求2) --- */
    .product-media {
      width: 100%; height: 250px; background: #eee; overflow: hidden; position: relative;
    }
    .product-media img, .product-media video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* --- GRID --- */
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px; padding: 40px; max-width: 1200px; margin: 0 auto;
    }
    .product-card {
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); transition: 0.3s;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .product-info { padding: 20px; }
    .price-tag { color: var(--pink-dark); font-weight: 800; font-size: 1.2rem; margin: 10px 0; }
    
    .btn-add {
      width: 100%; padding: 12px; border: none; border-radius: 50px;
      background: var(--pink); color: white; font-weight: 700; cursor: pointer;
    }

    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="lang-switcher">
      <button class="lang-btn" id="btn-th" onclick="setLang('th')">TH</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="logo" onclick="showPage('home')">📦 Tee Ouan</div>
  </div>
  <ul class="nav-links">
    <li><a id="nav-home" onclick="showPage('home')" class="active">Home</a></li>
    <li><a id="nav-products" onclick="showPage('products')">Products</a></li>
  </ul>
</nav>

<main>
  <section id="page-home" class="page active" style="text-align:center; padding: 100px 20px;">
    <h1 id="hero-title">ยินดีต้อนรับ</h1>
    <p id="hero-desc">บรรจุภัณฑ์คุณภาพดีสำหรับธุรกิจของคุณ</p>
  </section>

  <section id="page-products" class="page">
    <div class="products-grid" id="product-container">
      </div>
  </section>
</main>

<script>
  /* 要求3: 商品データの管理（ここに追加するだけでOK） */
  const products = [
    {
      name: { th: "กล่องพัสดุ เบอร์ A", en: "Shipping Box Size A" },
      desc: { th: "หนาพิเศษ รับแรงกระแทกได้ดี", en: "Extra thick, high durability" },
      price: 15,
      mediaType: "image", // image または video
      mediaUrl: "photoo/sizeA.JPG"
    },
    {
      name: { th: "พลาสติกกันกระแทก", en: "Bubble Wrap" },
      desc: { th: "หน้ากว้าง 65 ซม. ยาว 100 ม.", en: "Width 65cm, Length 100m" },
      price: 150,
      mediaType: "video", // 動画の例
      mediaUrl: "photoo/bubble_demo.mp4" 
    }
  ];

  const translations = {
    th: {
      home: "หน้าหลัก",
      products: "สินค้า",
      heroTitle: "ยินดีต้อนรับสู่ Tee Ouan",
      heroDesc: "บรรจุภัณฑ์ที่แม่ค้าออนไลน์ไว้วางใจ",
      add: "เพิ่มลงตะกร้า"
    },
    en: {
      home: "Home",
      products: "Products",
      heroTitle: "Welcome to Tee Ouan",
      heroDesc: "Packaging you can trust",
      add: "Add to Cart"
    }
  };

  let currentLang = 'th'; // 要求1: デフォルトはタイ語

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
    updateUI();
  }

  function updateUI() {
    const t = translations[currentLang];
    document.getElementById('nav-home').innerText = t.home;
    document.getElementById('nav-products').innerText = t.products;
    document.getElementById('hero-title').innerText = t.heroTitle;
    document.getElementById('hero-desc').innerText = t.heroDesc;
    renderProducts();
  }

  function renderProducts() {
    const container = document.getElementById('product-container');
    container.innerHTML = '';

    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';

      // 要求2: 画像と動画の出し分け
      let mediaHtml = '';
      if(p.mediaType === 'video') {
        mediaHtml = `<video src="${p.mediaUrl}" autoplay muted loop playsinline></video>`;
      } else {
        mediaHtml = `<img src="${p.mediaUrl}" alt="product">`;
      }

      card.innerHTML = `
        <div class="product-media">${mediaHtml}</div>
        <div class="product-info">
          <h3>${p.name[currentLang]}</h3>
          <p style="font-size:0.8rem; color:#666;">${p.desc[currentLang]}</p>
          <div class="price-tag">฿${p.price}</div>
          <button class="btn-add">${translations[currentLang].add}</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-' + pageId).classList.add('active');
  }

  // 初期化
  setLang('th');
</script>

</body>
</html>
